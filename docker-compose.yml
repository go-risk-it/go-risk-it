services:
  db:
    extends:
      file: supabase/docker-compose.yml
      service: db
  auth:
    extends:
      file: supabase/docker-compose.yml
      service: auth
  kong:
    extends:
      file: supabase/docker-compose.yml
      service: kong

  migrate:
    image: migrate/migrate:latest@sha256:de154de4b7f9d0d751aacb1ec6023f5fc96f874eb88b65d050f761a33376aa4b
    volumes:
      - ./internal/data/sqlc/migrations:/migrations
    command: -verbose -path=/migrations/ -database postgresql://postgres:password@postgres:5432/risk-it?sslmode=disable up
    depends_on:
      db:
        condition: service_healthy

  sqlc:
    image: sqlc/sqlc:latest@sha256:c2a7e80357000614571266cea1e4a0a9010ec03637998d71053c2ac6bb4b9f06
    env_file:
      - component-test/.env
    volumes:
      - ./:/src
    working_dir: /src
    command: generate
    depends_on:
      - migrate

  mockery:
    image: vektra/mockery:v2.44.1@sha256:c82f380a14fc74c1031d13300f120206b8960850fd433021624d8ec0cb53e5a7
    volumes:
      - ./:/src
    working_dir: /src
    depends_on:
      - sqlc

  risk-it:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
  socket:
  db-config:
