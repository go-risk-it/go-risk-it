version: '3.8'

services:
  db:
    extends:
      file: supabase/docker-compose.yml
      service: db
  auth:
    extends:
      file: supabase/docker-compose.yml
      service: auth
  kong:
    extends:
      file: supabase/docker-compose.yml
      service: kong

  migrate:
    image: migrate/migrate:latest@sha256:de154de4b7f9d0d751aacb1ec6023f5fc96f874eb88b65d050f761a33376aa4b
    volumes:
      - ./internal/data/sqlc/migrations:/migrations
    command: -verbose -path=/migrations/ -database postgresql://postgres:password@postgres:5432/risk-it?sslmode=disable up
    depends_on:
      db:
        condition: service_healthy

  sqlc:
    image: sqlc/sqlc:latest@sha256:8c4b8578328b35754c89ed6ccea5fa62db9f14f341a691c4876740ce2c189a54
    env_file:
      - component-test/.env
    volumes:
      - ./:/src
    working_dir: /src
    command: generate
    depends_on:
      - migrate

  mockery:
    image: vektra/mockery:v2.43.1@sha256:26ffcc667a9b1ab9634dc8ebb506357089c525dc35521d2d5c5d04d5bba7c0d3
    volumes:
      - ./:/src
    working_dir: /src
    depends_on:
      - sqlc

  risk-it:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
  socket:
  db-config:
